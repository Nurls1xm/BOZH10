services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - monitoring

  graphite:
    image: graphiteapp/graphite-statsd:latest
    container_name: graphite
    ports:
      - "8081:80"
      - "2003:2003"
      - "8125:8125/udp"
    restart: unless-stopped
    networks:
      - monitoring

  test-metrics:
    build: ./test-metrics
    container_name: test-metrics
    depends_on:
      - graphite
    restart: unless-stopped
    networks:
      - monitoring

  batch-job:
    build: ./batch-job
    container_name: batch-job
    depends_on:
      - graphite
    restart: "no"
    networks:
      - monitoring



volumes:

networks:
  monitoring:
    driver: bridge
